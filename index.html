<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보물창고</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6fb;
        }

        header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 0 30px;
            background: white;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
        }

        header h1 {
            color: #264d87;
            letter-spacing: 2px;
        }

        .intro {
            margin: 0;
        }

        .intro p {
            color: #777;
            margin: 0;
        }

        .category {
            margin: 40px;
        }

        .category h2 {
            color: #264d87;
            margin-bottom: 20px;
            border-left: 6px solid #264d87;
            padding-left: 10px;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            width: 120px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card a {
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        .card img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 10px;
            transition: .3s;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            color: gray;
            margin: 60px 0 30px;
        }
        @media (max-width: 768px){

    header{
        flex-direction: column;
        align-items: flex-start;
        height: auto;
        padding: 20px;
        gap: 8px;
    }

    .intro{
        margin: 0;
    }

    .intro p{
        font-size: 14px;
    }

}
    </style>
</head>
